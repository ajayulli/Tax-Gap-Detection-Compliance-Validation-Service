spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tax_audit_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: rootpassword # Replace with your actual MySQL password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 'update' automatically creates/updates the tables based on your Java Entities
      ddl-auto: update
    show-sql: false # Set to true if you want to see the SQL queries in the console
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8080